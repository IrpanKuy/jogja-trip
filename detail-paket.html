<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Detail Paket - JogjaTrip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body>
    <div id="detail-content"></div>

    <script src="data.js"></script>
    <script src="shared.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const urlParams = new URLSearchParams(window.location.search);
        const id = parseInt(urlParams.get('id'));
        const p = tourPackages.find(item => item.id === id);

        if (p) {
          document.title = `${p.name} - JogjaTrip`;
          const content = `
            <header class="relative h-[60vh] flex items-center justify-center overflow-hidden">
              <img src="${p.img}" class="absolute inset-0 w-full h-full object-cover" alt="${p.name}">
              <div class="absolute inset-0 bg-black/50"></div>
              <div class="relative z-10 text-center text-white px-6" data-aos="fade-up">
                <span class="bg-primary px-4 py-1 rounded-full text-xs font-bold mb-4 inline-block">${p.dur}</span>
                <h1 class="text-4xl md:text-6xl font-extrabold mb-4">${p.name}</h1>
                <div class="price-tag">Rp ${p.price}</div>
              </div>
            </header>

            <section class="py-20 max-w-7xl mx-auto px-6">
              <div class="grid grid-cols-1 lg:grid-cols-3 gap-12">
                <div class="lg:col-span-2">
                  <h2 class="text-3xl font-bold mb-6">Deskripsi Perjalanan</h2>
                  <p class="text-gray-600 mb-10 text-lg leading-relaxed">${p.desc}</p>
                  
                  <h2 class="text-3xl font-bold mb-6">Rencana Perjalanan (Itinerary)</h2>
                  <ul class="itinerary-list mb-12">
                    ${p.it.map(item => `<li class="text-lg text-gray-700">${item}</li>`).join('')}
                  </ul>

                  <h2 class="text-3xl font-bold mb-6">Fasilitas & Layanan</h2>
                  <div class="flex flex-wrap gap-3">
                    ${p.feat.map(f => `<span class="bg-gray-100 border px-4 py-2 rounded-xl text-sm font-semibold text-gray-600">${f}</span>`).join('')}
                  </div>
                </div>

                <div class="lg:col-span-1">
                  <div class="card p-8 sticky top-32">
                    <h3 class="text-2xl font-bold mb-6">Pesan Sekarang</h3>
                    <p class="text-gray-500 mb-8 text-sm">Konsultasikan rencana perjalanan Anda dengan admin kami via WhatsApp.</p>
                    <button onclick="bookingWA('${p.name}')" class="w-full btn-primary py-4 text-lg mb-4 flex items-center justify-center gap-3">
                      <svg class="w-6 h-6" fill="currentColor" viewBox="0 0 24 24"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z" /></svg>
                      Pesan Sekarang
                    </button>
                    <a href="paket.html" class="w-full btn-outline text-center py-3 block">Kembali ke Daftar Paket</a>
                  </div>
                </div>
              </div>
            </section>
          `;
          document.getElementById('detail-content').innerHTML = content;
        } else {
          document.getElementById('detail-content').innerHTML = '<div class="h-screen flex items-center justify-center"><h1>Paket tidak ditemukan. <a href="paket.html">Kembali</a></h1></div>';
        }
      });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  </body>
</html>
