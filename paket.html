<!doctype html>
<html lang="id">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Paket Wisata Jogja - JogjaTrip</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;700&display=swap" rel="stylesheet" />
    <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
  </head>
  <body class="bg-gray-50">
    
    <header class="package-detail-header text-center">
      <div class="max-w-4xl mx-auto px-6" data-aos="fade-up">
        <h1 class="text-4xl md:text-5xl font-extrabold text-white mb-6">Pilihan Paket Wisata</h1>
        <p class="text-white/70 text-lg">Temukan pengalaman tak terlupakan dengan paket wisata terbaik kami di Yogyakarta.</p>
      </div>
    </header>

    <section class="py-20 max-w-7xl mx-auto px-6">
      <div id="all-packages" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-8"></div>
    </section>

    <script src="data.js"></script>
    <script src="shared.js"></script>
    <script>
      document.addEventListener('DOMContentLoaded', () => {
        const container = document.getElementById("all-packages");
        tourPackages.forEach((p, i) => {
          container.innerHTML += renderPackageCard(p, i);
        });
      });
    </script>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  </body>
</html>
